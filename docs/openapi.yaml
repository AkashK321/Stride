openapi: 3.0.3
info:
  title: Stride API
  description: |
    REST API and WebSocket API for the Stride application. Provides authentication endpoints
    for user login and registration using AWS Cognito, as well as indoor navigation endpoints
    and WebSocket connections for live navigation updates.
  version: 1.0.0
  contact:
    name: Stride Development Team

servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/prod
    description: Production API Gateway REST endpoint
  - url: wss://{wsApiId}.execute-api.{region}.amazonaws.com/prod
    description: Production WebSocket API endpoint for live navigation and object detection

tags:
  - name: Authentication
    description: User authentication and registration endpoints
  - name: Items
    description: Items endpoint (placeholder)
  - name: Navigation
    description: Indoor navigation and search endpoints

paths:
  /login:
    post:
      tags:
        - Authentication
      summary: User login
      description: |
        Authenticates a user with username and password using AWS Cognito.
        Returns JWT tokens (access token, ID token, and refresh token) upon successful authentication.
        
        **Input Normalization:**
        - Username and password are trimmed of leading/trailing whitespace
        - Cognito handles all format validation
        
        **Error Handling:**
        - Invalid credentials return 401
        - Missing fields return 400
        - Rate limiting returns 429
        - Server errors return 500
        
        **Error Message Sanitization:**
        - All error messages are sanitized to remove sensitive information (Request IDs, Service names, Status Codes)
        - User-friendly messages are returned instead of raw Cognito error messages
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              validLogin:
                summary: Valid login request
                value:
                  username: "johndoe"
                  password: "SecurePass123!"
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  summary: Successful login response
                  value:
                    accessToken: "eyJraWQiOiJcL3Z..."
                    idToken: "eyJraWQiOiJcL3Z..."
                    refreshToken: "eyJjdHkiOiJKV1QiLCJlbmMiOiJBMjU2R0NNIn0..."
                    expiresIn: 3600
                    tokenType: "Bearer"
        '400':
          description: Bad request - missing or invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    error: "Username and password are required"
                invalidFormat:
                  summary: Invalid JSON format
                  value:
                    error: "Invalid request format. Expected JSON with username and password"
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  summary: Invalid username or password
                  value:
                    error: "Invalid username or password"
                userNotFound:
                  summary: User does not exist
                  value:
                    error: "User not found"
                challengeRequired:
                  summary: Authentication challenge required
                  value:
                    error: "Authentication challenge required: NEW_PASSWORD_REQUIRED"
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tooManyRequests:
                  summary: Rate limit exceeded
                  value:
                    error: "Too many requests. Please try again later"
        '403':
          description: Forbidden - user account not confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notConfirmed:
                  summary: User account not confirmed
                  value:
                    error: "User account is not confirmed"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  summary: Server configuration error
                  value:
                    error: "Server configuration error"
                internalError:
                  summary: Internal server error
                  value:
                    error: "Internal server error"

  /register:
    post:
      tags:
        - Authentication
      summary: User registration
      description: |
        Registers a new user in AWS Cognito with username, password, first name, last name,
        and an email address. Registration is email-only.
        The user is created with a permanent password and can immediately log in.
        
        **Input Normalization:**
        - Username is trimmed of leading/trailing whitespace
        - Email is trimmed and converted to lowercase
        - First name and last name are trimmed
        - Password is trimmed
        - Cognito handles all format validation
        
        **Error Handling:**
        - Duplicate username or alias returns 409
        - Invalid password format returns 400
        - Missing required fields return 400
        - Rate limiting returns 429
        - Server errors return 500
        
        **Error Message Sanitization:**
        - All error messages are sanitized to remove sensitive information (Request IDs, Service names, Status Codes)
        - User-friendly messages are returned instead of raw Cognito error messages
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              validRegistrationEmailOnly:
                summary: Valid registration (email required)
                value:
                  username: "alexdoe"
                  password: "SecurePass123!"
                  passwordConfirm: "SecurePass123!"
                  email: "alex.doe@example.com"
                  firstName: "Alex"
                  lastName: "Doe"
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              examples:
                success:
                  summary: Successful registration
                  value:
                    message: "User registered successfully"
        '400':
          description: Bad request - missing fields, invalid input, or password requirements not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    error: "Username, password, passwordConfirm, firstName, and lastName are required"
                invalidFormat:
                  summary: Invalid JSON format
                  value:
                    error: "Invalid request format. Expected JSON with username, password, passwordConfirm, email, firstName, and lastName"
                passwordMismatch:
                  summary: Passwords do not match
                  value:
                    error: "Passwords do not match"
                usernameTooLong:
                  summary: Username exceeds maximum length
                  value:
                    error: "Username must be 64 characters or less"
                invalidPassword:
                  summary: Password doesn't meet requirements
                  value:
                    error: "Password does not meet requirements"
                invalidParameter:
                  summary: Invalid parameter (sanitized message)
                  value:
                    error: "Invalid parameter provided"
        '409':
          description: Conflict - username or alias already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateUsername:
                  summary: Username already exists
                  value:
                    error: "Username already exists"
                duplicateAlias:
                  summary: Email already exists
                  value:
                    error: "An account with this email already exists"
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                tooManyRequests:
                  summary: Rate limit exceeded
                  value:
                    error: "Too many requests. Please try again later"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  summary: Server configuration error
                  value:
                    error: "Server configuration error"
                internalError:
                  summary: Internal server error
                  value:
                    error: "Internal server error"

  /register/verify-email:
    post:
      tags:
        - Authentication
      summary: Verify email address
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Verifies a user's email address using a verification code sent during registration.
        Uses Cognito's `ConfirmSignUp` or `VerifyUserAttribute` API.
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - code
              properties:
                username:
                  type: string
                  description: Username of the user to verify
                  example: "johndoe"
                code:
                  type: string
                  description: Verification code sent to the email
                  example: "123456"
      responses:
        '200':
          description: Email successfully verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email verified successfully"
        '400':
          description: Bad request - invalid code or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /register/resend-code:
    post:
      tags:
        - Authentication
      summary: Resend verification code
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Resends a verification code to the user's email.
        Uses Cognito's `ResendConfirmationCode` API.
      operationId: resendVerificationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  description: Username of the user
                  example: "johndoe"
      responses:
        '200':
          description: Verification code resent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Verification code sent successfully"
        '400':
          description: Bad request - missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests - rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /register/check-username:
    get:
      tags:
        - Authentication
      summary: Check username availability
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Checks if a username is available for registration.
        Uses Cognito's `AdminGetUser` API to check if the username exists.
      operationId: checkUsernameAvailability
      parameters:
        - name: username
          in: query
          required: true
          description: Username to check
          schema:
            type: string
            example: "johndoe"
      responses:
        '200':
          description: Username availability check result
          content:
            application/json:
              schema:
                type: object
                required:
                  - available
                properties:
                  available:
                    type: boolean
                    description: Whether the username is available
                    example: true
                  username:
                    type: string
                    description: The username that was checked
                    example: "johndoe"
        '400':
          description: Bad request - missing username parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /register/check-email:
    get:
      tags:
        - Authentication
      summary: Check email uniqueness
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Checks if an email address is already registered.
        Uses Cognito's `ListUsers` API with email filter to check for existing users.
      operationId: checkEmailUniqueness
      parameters:
        - name: email
          in: query
          required: true
          description: Email address to check
          schema:
            type: string
            format: email
            example: "john.doe@example.com"
      responses:
        '200':
          description: Email uniqueness check result
          content:
            application/json:
              schema:
                type: object
                required:
                  - available
                properties:
                  available:
                    type: boolean
                    description: Whether the email is available (not already registered)
                    example: true
                  email:
                    type: string
                    description: The email address that was checked
                    example: "john.doe@example.com"
        '400':
          description: Bad request - missing email parameter or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access and ID tokens
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Refreshes the access token and ID token using a valid refresh token.
        Uses Cognito's `InitiateAuth` API with `REFRESH_TOKEN_AUTH` flow.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Refresh token obtained from login
                  example: "eyJjdHkiOiJKV1QiLCJlbmMiOiJBMjU2R0NNIn0..."
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  summary: Successful token refresh
                  value:
                    accessToken: "eyJraWQiOiJcL3Z..."
                    idToken: "eyJraWQiOiJcL3Z..."
                    refreshToken: "eyJjdHkiOiJKV1QiLCJlbmMiOiJBMjU2R0NNIn0..."
                    expiresIn: 3600
                    tokenType: "Bearer"
        '400':
          description: Bad request - missing refresh token or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /password/forgot:
    post:
      tags:
        - Authentication
      summary: Initiate password reset
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Initiates a password reset flow by sending a verification code to the user's
        registered email address. Uses Cognito's `ForgotPassword` API.
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  description: Username or email address of the user
                  example: "johndoe"
      responses:
        '200':
          description: Password reset code sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset code sent to your registered email or phone"
        '400':
          description: Bad request - missing username or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests - rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /password/reset:
    post:
      tags:
        - Authentication
      summary: Reset password with verification code
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Resets the user's password using a verification code sent via email.
        Uses Cognito's `ConfirmForgotPassword` API.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - code
                - newPassword
                - newPasswordConfirm
              properties:
                username:
                  type: string
                  description: Username or email address of the user
                  example: "johndoe"
                code:
                  type: string
                  description: Verification code sent to email or phone
                  example: "123456"
                newPassword:
                  type: string
                  description: New password (must meet Cognito password policy)
                  format: password
                  example: "NewSecurePass123!"
                newPasswordConfirm:
                  type: string
                  description: Password confirmation (must match newPassword)
                  format: password
                  example: "NewSecurePass123!"
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successfully"
        '400':
          description: Bad request - invalid code, password mismatch, or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                passwordMismatch:
                  summary: Passwords do not match
                  value:
                    error: "Passwords do not match"
                invalidCode:
                  summary: Invalid verification code
                  value:
                    error: "Invalid verification code"
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests - rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /password/change:
    post:
      tags:
        - Authentication
      summary: Change password (authenticated)
      description: |
        **⚠️ NOT IMPLEMENTED YET**
        
        Changes the authenticated user's password. Requires a valid access token.
        Uses Cognito's `ChangePassword` API.
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - newPasswordConfirm
              properties:
                currentPassword:
                  type: string
                  description: User's current password
                  format: password
                  example: "OldSecurePass123!"
                newPassword:
                  type: string
                  description: New password (must meet Cognito password policy)
                  format: password
                  example: "NewSecurePass123!"
                newPasswordConfirm:
                  type: string
                  description: Password confirmation (must match newPassword)
                  format: password
                  example: "NewSecurePass123!"
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"
        '400':
          description: Bad request - password mismatch, invalid current password, or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                passwordMismatch:
                  summary: Passwords do not match
                  value:
                    error: "Passwords do not match"
                invalidCurrentPassword:
                  summary: Invalid current password
                  value:
                    error: "Current password is incorrect"
        '401':
          description: Unauthorized - invalid or missing access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests - rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /items:
    get:
      tags:
        - Items
      summary: Get items
      description: |
        Placeholder endpoint for retrieving items. Implementation status may vary.
        Returns 404 if not implemented.
      operationId: getItems
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Hello from Kotlin"
                  path:
                    type: string
                    example: "/items"
        '404':
          description: Endpoint not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search:
    get:
      tags:
        - Navigation
      summary: Search landmarks
      description: |
        Searches landmarks (rooms, facilities) by name. Returns matching landmarks
        with their floor number and nearest navigation node. The search is performed
        on the `name` field in the Landmarks table using case-insensitive partial matching.
        
        **Implementation Notes:**
        - Frontend should debounce search requests (e.g., 300ms delay) to reduce API calls
        - Results are ordered by relevance (exact matches first, then partial matches)
        - Query parameter must be at least 1 character
      operationId: searchLandmarks
      parameters:
        - name: query
          in: query
          required: true
          description: Search query (min 1 character). Searches the `name` field in the Landmarks table.
          schema:
            type: string
            minLength: 1
            example: "room 226"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
            example: 10
      responses:
        '200':
          description: Search completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              examples:
                success:
                  summary: Successful search results
                  value:
                    results:
                      - name: "Room 226"
                        floor_number: 2
                        nearest_node: "r226_door"
                      - name: "Room 224"
                        floor_number: 2
                        nearest_node: "r224_door"
                      - name: "Men's Restroom 219"
                        floor_number: 2
                        nearest_node: "r219_door"
        '400':
          description: Bad request - invalid or missing query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingQuery:
                  summary: Missing query parameter
                  value:
                    error: "Query parameter 'query' is required and must be at least 1 character"
                emptyQuery:
                  summary: Empty query string
                  value:
                    error: "Query parameter 'query' is required and must be at least 1 character"
        '401':
          description: Unauthorized - missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized request
                  value:
                    error: "Unauthorized"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  summary: Database or server error
                  value:
                    error: "Internal server error"

  /navigation/start:
    post:
      tags:
        - Navigation
      summary: Start navigation to destination
      description: |
        Starts a navigation session by calculating the path from the user's specified start node
        to the destination landmark. The backend uses A* pathfinding on MapNodes/MapEdges to
        calculate the complete navigation path.
        
        **Pathfinding:**
        - Uses A* algorithm on the navigation graph (MapEdges indexed by FloorID)
        - Handles multi-floor paths via elevator/stair edges
        - Returns complete path with all navigation instructions
        
        **Navigation Instructions:**
        - Each step provides distance in feet and direction (north, south, east, west)
        - Direction may be null for special cases like elevators or stairs
        - Frontend is responsible for generating user-friendly instruction text from distance and direction
        
        **Coordinates:**
        - All coordinates use feet (`x_feet`, `y_feet`)
        - Node coordinates are at decision points (doors, intersections, corners, elevators, stairwells)
        - Final destination coordinates are from the landmark's location
      operationId: startNavigation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NavigationStartRequest'
            examples:
              validRequest:
                summary: Valid navigation request
                value:
                  destination:
                    landmark_id: "landmark_123"
                  start_location:
                    node_id: "staircase_main_2S01"
      responses:
        '200':
          description: Navigation path calculated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigationStartResponse'
              examples:
                success:
                  summary: Successful navigation path
                  value:
                    session_id: "nav_session_abc123"
                    instructions:
                      - step: 1
                        distance_feet: 13.0
                        direction: "west"
                        node_id: "staircase_main_2S01"
                        coordinates:
                          x_feet: 0
                          y_feet: 0
                      - step: 2
                        distance_feet: 0
                        direction: "west"
                        node_id: "stair_west_corner"
                        coordinates:
                          x_feet: -13
                          y_feet: 0
                      - step: 3
                        distance_feet: 15.0
                        direction: "west"
                        node_id: "r226_door"
                        coordinates:
                          x_feet: -28
                          y_feet: 0
                      - step: 4
                        distance_feet: 5.0
                        direction: "south"
                        node_id: "r226_door"
                        coordinates:
                          x_feet: -28
                          y_feet: -5
        '400':
          description: Bad request - invalid destination or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  summary: Missing required fields
                  value:
                    error: "Destination and start_location.node_id are required"
                invalidNodeId:
                  summary: Invalid node ID
                  value:
                    error: "Invalid node ID in start_location"
        '401':
          description: Unauthorized - missing or invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Unauthorized request
                  value:
                    error: "Unauthorized"
        '404':
          description: Destination not found or no path available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                destinationNotFound:
                  summary: Destination landmark not found
                  value:
                    error: "Destination not found"
                noPathAvailable:
                  summary: No path available between start and destination
                  value:
                    error: "No path available to destination"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  summary: Server or pathfinding error
                  value:
                    error: "Internal server error"

  /navigation/frame:
    post:
      tags:
        - Navigation
      summary: Send navigation frame (WebSocket)
      description: |
        **⚠️ WebSocket Endpoint - Not a REST endpoint**

        This documents the JSON body shape for messages sent **over** the WebSocket.
        API Gateway uses **`$request.body.action`** to choose the integration (see CDK `route_selection_expression`).

        **Routing**

        | `action` value | Lambda | Typical client interval | Server response shape |
        | --- | --- | --- | --- |
        | `"navigation"` | Live navigation | ~1 s during active session | `NavigationUpdateMessage` (`type: navigation_update`) |
        | `"frame"` | Object detection | ~500 ms (collision loop) | `ObjectDetectionWebSocketResponse` (distances, no `type` field) |

        **Connection**

        1. Connect to the WebSocket URL (e.g. `wss://{apiId}.execute-api.{region}.amazonaws.com/{stage}`).
        2. Send JSON messages; each must include **`action`**: `"navigation"` or `"frame"`.
        3. Responses are pushed on the same connection; match outbound messages using **`request_id`**.

        **Sensor data** (shared shape for both actions when using the mobile client)

        - `focal_length_pixels`: Per-device focal length for distance estimation (device map + `expo-device`)
        - `gps`, `accelerometer`, `gyroscope`, `heading_degrees`, `timestamp_ms`: as in `NavigationFrameMessage`
      operationId: sendNavigationFrame
      requestBody:
        required: true
        description: Navigation frame message sent via WebSocket
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NavigationFrameMessage'
            examples:
              navigationFrame:
                summary: Live navigation (`action` routes to LiveNavigationHandler)
                value:
                  action: "navigation"
                  session_id: "nav_session_abc123"
                  image_base64: "<base64-encoded-image>"
                  focal_length_pixels: 1435.2
                  heading_degrees: 270.0
                  gps:
                    latitude: 39.1653
                    longitude: -86.5264
                    altitude: 230.5
                    accuracy: 5.0
                    altitude_accuracy: 10.0
                    speed: 1.2
                  accelerometer:
                    x: 0.1
                    y: 0.0
                    z: 9.8
                  gyroscope:
                    x: 0.01
                    y: -0.02
                    z: 0.005
                  timestamp_ms: 1739052345123
                  request_id: 42
              objectDetectionFrame:
                summary: Object detection only (`action` routes to ObjectDetectionHandler)
                value:
                  action: "frame"
                  session_id: "nav_session_abc123"
                  image_base64: "<base64-encoded-image>"
                  focal_length_pixels: 1435.2
                  heading_degrees: 270.0
                  gps:
                    latitude: 39.1653
                    longitude: -86.5264
                    altitude: 230.5
                    accuracy: 5.0
                    altitude_accuracy: 10.0
                    speed: 1.2
                  accelerometer:
                    x: 0.1
                    y: 0.0
                    z: 9.8
                  gyroscope:
                    x: 0.01
                    y: -0.02
                    z: 0.005
                  timestamp_ms: 1739052345123
                  request_id: 43
      responses:
        '200':
          description: |
            Response is sent over the WebSocket (not as an HTTP body). Shape depends on `action`:
            navigation updates vs object-detection distances.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NavigationUpdateMessage'
                  - $ref: '#/components/schemas/ObjectDetectionWebSocketResponse'
                  - $ref: '#/components/schemas/NavigationErrorMessage'
                  - $ref: '#/components/schemas/NavigationCompleteMessage'
              examples:
                navigationUpdate:
                  summary: Regular navigation update
                  value:
                    type: "navigation_update"
                    session_id: "nav_session_abc123"
                    current_step: 2
                    remaining_instructions:
                      - step: 2
                        distance_feet: 5.0
                        direction: "west"
                        node_id: "stair_west_corner"
                        coordinates:
                          x_feet: -13
                          y_feet: 0
                    estimated_position:
                      node_id: "stair_west_corner"
                      coordinates:
                        x_feet: -13
                        y_feet: 0
                    message: "Localization: PDR + landmark fusion; closest map node returned in estimated_position."
                    request_id: 42
                objectDetectionResponse:
                  summary: Object-detection response (`action` was `frame`)
                  value:
                    frameSize: 245760
                    valid: true
                    estimatedDistances:
                      - className: "person"
                        distance: "2.500"
                    request_id: 43
                navigationComplete:
                  summary: Navigation completed
                  value:
                    type: "navigation_complete"
                    session_id: "nav_session_abc123"
                    message: "You have arrived at Room 226"
                navigationError:
                  summary: Navigation error
                  value:
                    type: "navigation_error"
                    session_id: "nav_session_abc123"
                    error: "Invalid or expired session_id"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from login endpoint
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: User's username (will be trimmed)
          example: "johndoe"
          minLength: 1
        password:
          type: string
          description: User's password (will be trimmed)
          example: "SecurePass123!"
          format: password
          minLength: 1

    LoginResponse:
      type: object
      required:
        - accessToken
        - idToken
        - refreshToken
        - expiresIn
        - tokenType
      properties:
        accessToken:
          type: string
          description: JWT access token for API authentication
          example: "eyJraWQiOiJcL3Z..."
        idToken:
          type: string
          description: JWT ID token containing user identity information
          example: "eyJraWQiOiJcL3Z..."
        refreshToken:
          type: string
          description: Refresh token for obtaining new access tokens
          example: "eyJjdHkiOiJKV1QiLCJlbmMiOiJBMjU2R0NNIn0..."
        expiresIn:
          type: integer
          description: Token expiration time in seconds
          example: 3600
        tokenType:
          type: string
          description: Token type (always "Bearer" for Cognito)
          example: "Bearer"
          enum:
            - Bearer

    RegisterRequest:
      type: object
      description: |
        Registration payload. `username`, `password`, `passwordConfirm`, `email`,
        `firstName`, and `lastName` are required.
      required:
        - username
        - password
        - passwordConfirm
        - email
        - firstName
        - lastName
      properties:
        username:
          type: string
          description: Desired username (will be trimmed, must be unique, max 64 characters)
          example: "johndoe"
          minLength: 1
          maxLength: 64
        password:
          type: string
          description: User's password (will be trimmed, must meet Cognito password policy)
          example: "SecurePass123!"
          format: password
          minLength: 1
        passwordConfirm:
          type: string
          description: Password confirmation (must match password)
          example: "SecurePass123!"
          format: password
          minLength: 1
        email:
          type: string
          description: User's email address (will be trimmed and lowercased)
          format: email
          example: "john.doe@example.com"
        firstName:
          type: string
          description: User's first name (will be trimmed)
          example: "John"
          minLength: 1
        lastName:
          type: string
          description: User's last name (will be trimmed)
          example: "Doe"
          minLength: 1

    RegisterResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Success message
          example: "User registered successfully"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message describing what went wrong
          example: "Invalid username or password"

    SearchResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          description: List of matching landmarks
          items:
            $ref: '#/components/schemas/LandmarkResult'

    LandmarkResult:
      type: object
      required:
        - landmark_id
        - name
        - floor_number
        - nearest_node
      properties:
        landmark_id:
          type: integer
          description: Primary key of the landmark (use as destination.landmark_id when calling /navigation/start)
          example: 1
        name:
          type: string
          description: Landmark name (e.g., "Room 226", "Men's Restroom 219")
          example: "Room 226"
        floor_number:
          type: integer
          description: Floor number where the landmark is located
          example: 2
        nearest_node:
          type: string
          description: String ID of the nearest navigation node (e.g. "r226_door"). Used for display; use landmark_id for navigation/start.
          example: "r226_door"

    NavigationStartRequest:
      type: object
      required:
        - destination
        - start_location
      properties:
        destination:
          type: object
          required:
            - landmark_id
          properties:
            landmark_id:
              type: string
              description: ID of the destination landmark
              example: "landmark_123"
        start_location:
          type: object
          required:
            - node_id
          properties:
            node_id:
              type: string
              description: Node ID where navigation starts
              example: "staircase_main_2S01"

    NavigationStartResponse:
      type: object
      required:
        - session_id
        - instructions
      properties:
        session_id:
          type: string
          description: Unique session ID for this navigation instance
          example: "nav_session_abc123"
        instructions:
          type: array
          description: List of turn-by-turn navigation instructions
          items:
            $ref: '#/components/schemas/NavigationInstruction'
    NavigationInstruction:
      type: object
      required:
        - step
        - distance_feet
        - direction
        - node_id
        - coordinates
      properties:
        step:
          type: integer
          description: Step number in the navigation sequence
          example: 1
        distance_feet:
          type: number
          description: Distance to travel in feet for this step
          example: 13.0
        direction:
          type: string
          nullable: true
          description: |
            Direction to walk for this step. Cardinal directions: "north", "south", "east", "west".
            May be null for special cases like elevators or stairs where direction is not applicable.
          enum:
            - north
            - south
            - east
            - west
          example: "west"
        node_id:
          type: string
          description: Node ID associated with this step
          example: "staircase_main_2S01"
        coordinates:
          type: object
          required:
            - x_feet
            - y_feet
          description: Coordinates of this step in feet
          properties:
            x_feet:
              type: number
              description: X coordinate in feet
              example: 0
            y_feet:
              type: number
              description: Y coordinate in feet
              example: 0
        heading_degrees:
          type: number
          nullable: true
          description: |
            Compass bearing in degrees 0-360, null for final "arrive" step.
          example: 90
        turn_at_end:
          type: string
          nullable: true
          description: |
            At the end of this segment, the user should turn this way.
            Computed from the change in heading to the next instruction.
          enum:
            - left
            - right
            - around
            - straight
          example: "left"

    PathNode:
      type: object
      required:
        - node_id
        - coordinates
      properties:
        node_id:
          type: string
          description: Node ID
          example: "staircase_main_2S01"
        coordinates:
          type: object
          required:
            - x_feet
            - y_feet
          description: Node coordinates in feet
          properties:
            x_feet:
              type: number
              description: X coordinate in feet
              example: 0
            y_feet:
              type: number
              description: Y coordinate in feet
              example: 0

    NavigationFrameMessage:
      type: object
      description: |
        Client → Server WebSocket message for camera + sensors.

        **`action` is required for API Gateway:** the stack uses `route_selection_expression:
        $request.body.action`, so each message must set **`action`** to **`"navigation"`** (live
        localization and path updates) or **`"frame"`** (object detection / distances only).

        **Sensor Data Sources (Expo):**
        - `focal_length_pixels`: Computed on the frontend from a hardcoded device model → focal length map
          using `expo-device` to detect the device. Focal length in mm and sensor width in mm are mapped
          per device, then converted to pixels: `f_pixels = (f_mm / sensor_width_mm) * image_width_pixels`.
        - `gps`: From `expo-location` (`Location.getCurrentPositionAsync` or `Location.watchPositionAsync`).
        - `accelerometer`: From `expo-sensors` (`Accelerometer`).
        - `gyroscope`: From `expo-sensors` (`Gyroscope`).
        - `heading_degrees`: From `expo-location` (`Location.watchHeadingAsync`) or `expo-sensors` (`Magnetometer`).
      required:
        - action
        - session_id
        - image_base64
        - heading_degrees
        - accelerometer
        - gyroscope
        - focal_length_pixels
        - request_id
      properties:
        action:
          type: string
          description: Selects WebSocket integration (`navigation` vs `frame`)
          enum:
            - navigation
            - frame
          example: "navigation"
        session_id:
          type: string
          description: Active navigation session ID from /navigation/start
          example: "nav_session_abc123"
        image_base64:
          type: string
          description: JPEG/PNG frame encoded as base64
          format: byte
          example: "<base64-encoded-image>"
        focal_length_pixels:
          type: number
          description: |
            Camera focal length in pixels, used for distance estimation.
            Computed on the frontend from a per-device hardcoded map:
            `f_pixels = (f_mm / sensor_width_mm) * image_width_pixels`.
            The device model is detected via `expo-device` (`Device.modelName`).
            If the device is not in the map, a reasonable default should be used.
          example: 1435.2
        heading_degrees:
          type: number
          description: |
            User heading from device sensors, in degrees (0–360),
            where 0/360 = north, 90 = east, 180 = south, 270 = west.
            Source: `expo-location` heading or `expo-sensors` magnetometer.
          example: 270.0
        gps:
          type: object
          description: |
            GPS location data from `expo-location`. Provides the device's current
            geographic position. May be used for initial localization or as a
            supplementary signal for indoor positioning.
          required:
            - latitude
            - longitude
          properties:
            latitude:
              type: number
              description: Latitude in decimal degrees (WGS84)
              example: 39.1653
            longitude:
              type: number
              description: Longitude in decimal degrees (WGS84)
              example: -86.5264
            altitude:
              type: number
              nullable: true
              description: Altitude in meters above sea level (may be null if unavailable)
              example: 230.5
            accuracy:
              type: number
              nullable: true
              description: Horizontal accuracy radius in meters (may be null if unavailable)
              example: 5.0
            altitude_accuracy:
              type: number
              nullable: true
              description: Vertical accuracy in meters (may be null if unavailable)
              example: 10.0
            speed:
              type: number
              nullable: true
              description: Speed in meters per second (may be null if unavailable)
              example: 1.2
        accelerometer:
          type: object
          description: |
            Raw accelerometer readings from `expo-sensors` (`Accelerometer`).
            Measures acceleration force along three axes including gravity.
          required:
            - x
            - y
            - z
          properties:
            x:
              type: number
              description: Acceleration on X axis (m/s²)
              example: 0.1
            y:
              type: number
              description: Acceleration on Y axis (m/s²)
              example: 0.0
            z:
              type: number
              description: Acceleration on Z axis (m/s²)
              example: 9.8
        gyroscope:
          type: object
          description: |
            Raw gyroscope readings from `expo-sensors` (`Gyroscope`).
            Measures rotation rate around three axes in radians per second.
          required:
            - x
            - y
            - z
          properties:
            x:
              type: number
              description: Rotation rate around X axis (rad/s)
              example: 0.01
            y:
              type: number
              description: Rotation rate around Y axis (rad/s)
              example: -0.02
            z:
              type: number
              description: Rotation rate around Z axis (rad/s)
              example: 0.005
        timestamp_ms:
          type: integer
          description: Client-side timestamp in milliseconds since epoch
          example: 1739052345123
        request_id:
          type: integer
          description: |
            Unique request identifier for latency tracking. Generated by the client
            and echoed back by the server in the response. Used to match request/response
            pairs and calculate round-trip latency.
          example: 42

    NavigationUpdateMessage:
      type: object
      description: |
        Server → Client WebSocket message for **`action: "navigation"`** requests.
        Contains fused position estimate and optional instruction list refresh.
      required:
        - type
        - session_id
        - current_step
        - remaining_instructions
      properties:
        type:
          type: string
          description: Message type
          enum:
            - navigation_update
          example: "navigation_update"
        session_id:
          type: string
          description: Navigation session ID
          example: "nav_session_abc123"
        current_step:
          type: integer
          description: |
            Increments once per successfully processed **`navigation`** frame (session counter
            persisted in DynamoDB). This is **not** tied to completing a turn-by-turn instruction;
            use for debugging or coarse progress only until instruction-based progression exists.
          example: 2
        remaining_instructions:
          type: array
          description: |
            New instructions when the path was recalculated (e.g., user off original path).
            May be **empty** when the closest node remains on the stored path—position still updates
            in session state.
          items:
            $ref: '#/components/schemas/NavigationInstruction'
        estimated_position:
          type: object
          description: Backend's best estimate of the user's current position
          required:
            - node_id
            - coordinates
          properties:
            node_id:
              type: string
              description: Closest navigation node to the estimated position
              example: "stair_west_corner"
            coordinates:
              type: object
              required:
                - x_feet
                - y_feet
              properties:
                x_feet:
                  type: number
                  description: Estimated X coordinate in feet
                  example: -13
                y_feet:
                  type: number
                  description: Estimated Y coordinate in feet
                  example: 0
        confidence:
          type: number
          description: Confidence in the localization result (0–1)
          example: 0.87
        request_id:
          type: integer
          description: |
            Echoed request identifier from the client's NavigationFrameMessage.
            Used by the client to match request/response pairs and calculate latency.
          example: 42
        message:
          type: string
          description: Short description of what the backend did for this update
          example: "Localization: PDR + landmark fusion; closest map node returned in estimated_position."

    ObjectDetectionWebSocketResponse:
      type: object
      description: |
        Server → Client WebSocket message for **`action: "frame"`** requests (object detection
        Lambda). Not a navigation protocol message—no `type` field.
      required:
        - frameSize
        - valid
        - estimatedDistances
        - request_id
      properties:
        frameSize:
          type: integer
          description: Decoded image size in bytes
          example: 245760
        valid:
          type: boolean
          description: Whether the payload decoded to a supported image
          example: true
        estimatedDistances:
          type: array
          description: Per-detection class name and distance estimate (meters, formatted string)
          items:
            type: object
            required:
              - className
              - distance
            properties:
              className:
                type: string
                example: "person"
              distance:
                type: string
                description: Distance in meters (decimal string)
                example: "2.500"
        request_id:
          type: integer
          description: Echoed from the client frame for latency matching
          example: 43

    NavigationErrorMessage:
      type: object
      description: Server → Client WebSocket error message for navigation sessions.
      required:
        - type
        - session_id
        - error
      properties:
        type:
          type: string
          enum:
            - navigation_error
          example: "navigation_error"
        session_id:
          type: string
          description: Navigation session ID associated with the error
          example: "nav_session_abc123"
        error:
          type: string
          description: Error message describing what went wrong
          example: "Invalid or expired session_id"

    NavigationCompleteMessage:
      type: object
      description: Server → Client WebSocket message indicating navigation is complete.
      required:
        - type
        - session_id
      properties:
        type:
          type: string
          enum:
            - navigation_complete
          example: "navigation_complete"
        session_id:
          type: string
          description: Navigation session ID
          example: "nav_session_abc123"
        message:
          type: string
          description: Optional human-readable completion message
          example: "You have arrived at Room 226"
