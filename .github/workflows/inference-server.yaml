# Run inference_server unit tests when that tree changes (isolated from main PR validation).
name: Inference server

on:
  pull_request:
    paths:
      - 'inference_server/**'
      - '.github/workflows/inference-server.yaml'
  push:
    branches: [main, master]
    paths:
      - 'inference_server/**'
      - '.github/workflows/inference-server.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: inference_server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: inference_server/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pytest
        run: pytest tests/ -v
