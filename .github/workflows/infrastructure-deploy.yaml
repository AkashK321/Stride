# ============================================================================
# WORKFLOW: Infrastructure Deploy
# ============================================================================
#
# PURPOSE:
#   Deploys AWS infrastructure: StrideSharedStack (shared RDS) plus the branch
#   CloudFormation stack (Lambdas from backend-build JAR, API Gateway, DynamoDB, etc.).
#   After deploy, reads shared RdsSecretArn, initializes the shared DB schema, and
#   runs floor/map population. Single workflow entry point for AWS deploys.
#
# TRIGGERS:
#   1. Called by backend-build (workflow_call):
#      - PRIMARY TRIGGER: Only after successful build and unit tests
#      - Automatically triggered when backend-build completes successfully on push events
#      - Inputs: branch_name, jar_artifact_name
#      - Branch name handling:
#        * Push events: Uses the branch that was pushed
#        * Main branch: Deploys to production stack (StrideStack)
#        * Feature branches: Deploys to branch-specific stack
#      - Downloads JAR artifact from backend-build and deploys everything
#      - NOTE: PRs are handled separately by pr-validation.yaml (no deployment)

#   2. Manual trigger (workflow_dispatch):
#      - Can be run manually with branch_name input
#      - Use with caution: bypasses build/test gates
#      - Requires JAR file to be manually placed in aws_resources/backend/build/libs/
#
# WORKFLOW FLOW:
#   workflow_call (from backend-build) OR workflow_dispatch
#       ↓
#   infrastructure-deploy runs
#       ↓
#   [Download JAR artifact from backend-build] → [Place JAR in backend/build/libs/]
#       ↓
#   [Check CDK bootstrap] → [Bootstrap if needed]
#       ↓
#   [Deploy CDK: StrideSharedStack then branch stack] → [Lambdas + shared RDS]
#       ↓
#   [Get stack outputs] → [Branch API/WS/Dynamo; shared RdsSecretArn for DB steps]
#       ↓
#   [Call integration-tests.yml]
#
# CALLS OTHER WORKFLOWS:
#   - integration-tests.yml (workflow_call)
#     * Condition: Always after successful stack deployment
#     * Purpose: Run integration tests against the newly deployed stack
#     * Inputs: api_endpoint, stack_name, branch_name
#
# OUTPUTS:
#   - Branch stack name (RestAPI / WebSocket / branch DynamoDB outputs)
#   - stride_db_secret_arn: RdsSecretArn from StrideSharedStack (shared Postgres)
#   - API Gateway endpoint URL, WebSocket URL, table names from the branch stack
#   - Deployment timestamp (in job summary)
#
# DEPENDENCIES:
#   - MUST be called by: backend-build.yml (after successful build and tests)
#   - Requires: JAR artifact from backend-build workflow
#   - This workflow ONLY runs automatically after backend-build succeeds
#   - Manual trigger (workflow_dispatch) available for testing/debugging only
#
# ============================================================================

name: Infrastructure Deploy

on:
  workflow_call:
    inputs:
      jar_artifact_name:
        required: true
        type: string
        description: 'Name of the JAR artifact to download'
      branch_name:
        required: false
        type: string
        description: 'Branch name for stack deployment (if not provided, will try to detect from context)'
  
  workflow_dispatch:
    inputs:
      jar_artifact_name:
        required: false
        type: string
        description: 'Name of the JAR artifact to download (optional)'
      branch_name:
        required: false
        type: string
        description: 'Branch name for stack deployment (optional)'

# Permissions required for OIDC (OpenID Connect) authentication and called workflows
permissions:
  id-token: write  # Required for OIDC to request JWT token
  contents: read   # Required to checkout code
  checks: write    # Required for called workflow (integration-tests) to create check runs
  pull-requests: write  # Required for called workflow (integration-tests) to post PR comments

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    outputs:
      api_endpoint: ${{ steps.stack-outputs.outputs.api_endpoint }}
      ws_api_endpoint: ${{ steps.stack-outputs.outputs.ws_api_endpoint }}
      coco_config_table: ${{ steps.stack-outputs.outputs.coco_config_table }}
      # Secrets Manager ARN for shared RDS (StrideSharedStack output RdsSecretArn)
      stride_db_secret_arn: ${{ steps.stack-outputs.outputs.stride_db_secret_arn }}
    
    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4
      

      # Step 2: Download JAR artifact from backend-build workflow
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.jar_artifact_name || 'kotlin-app-jar' }}
          path: aws_resources/backend/build/libs/
        continue-on-error: true
      
      # Step 3: Verify JAR exists in backend/build/libs/
      - name: Verify JAR exists
        working-directory: aws_resources/backend
        run: |
          if [ ! -f "build/libs/kotlin_app-1.0-all.jar" ]; then
            echo "❌ Error: JAR file not found!"
            echo "Expected location: build/libs/kotlin_app-1.0-all.jar"
            exit 1
          fi
          echo "✅ JAR verified:"
          ls -lh build/libs/kotlin_app-1.0-all.jar
      

      # Step 4: Set up Python for CDK
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            aws_resources/requirements.txt
            aws_resources/schema_initializer/requirements.txt
            aws_resources/data_population/requirements.txt
      
      # Step 5: Install Python dependencies
      - name: Install Python dependencies
        working-directory: aws_resources
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Keep schema initializer deps in its own folder for runtime imports.
          pip install --upgrade --target schema_initializer -r schema_initializer/requirements.txt
          pip install -r data_population/requirements.txt

      # Step 6: Install jq (required for parsing stack outputs)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      # Step 7: Install CDK
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install CDK
        run: npm install -g aws-cdk
      
      # Step 8: Configure AWS credentials
      # Note: Using OIDC role assumption (no long-lived access keys required)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      
      # Step 9: Check if CDK is bootstrapped
      - name: Check CDK bootstrap
        id: cdk-bootstrap
        run: |
          if aws cloudformation describe-stacks --stack-name CDKToolkit --region us-east-1 2>/dev/null | grep -q "CDKToolkit"; then
            echo "✅ CDK already bootstrapped"
            echo "bootstrapped=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ CDK not bootstrapped, will bootstrap now"
            echo "bootstrapped=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
      
      # Step 10: Bootstrap CDK if needed
      - name: Bootstrap CDK
        if: steps.cdk-bootstrap.outcome == 'failure' || steps.cdk-bootstrap.outputs.bootstrapped == 'false'
        working-directory: aws_resources
        run: |
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/us-east-1
      
      # Step 11: Calculate branch stack name
      - name: Get stack name
        id: get-stack-name
        working-directory: aws_resources
        run: |
          # Try input first, then GitHub context variables
          BRANCH_NAME="${{ inputs.branch_name }}"
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          fi
          # If still empty, try extracting from GITHUB_REF
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME=$(echo "${{ github.ref }}" | sed 's|refs/heads/||')
          fi
          
          if [ -z "$BRANCH_NAME" ]; then
            echo "ERROR: Could not determine branch name from GitHub context"
            echo "Available context:"
            echo "  GITHUB_HEAD_REF: ${GITHUB_HEAD_REF:-<empty>}"
            echo "  GITHUB_REF_NAME: ${GITHUB_REF_NAME:-<empty>}"
            echo "  GITHUB_REF: ${{ github.ref }}"
            echo "  Input branch_name: ${{ inputs.branch_name }}"
            exit 1
          fi

          STACK_NAME=$(BRANCH_NAME="$BRANCH_NAME" python3 -c "
          import os
          from app import sanitize_branch_name

          print(sanitize_branch_name(os.environ['BRANCH_NAME']))
          ")

          if [ -z "$STACK_NAME" ]; then
            echo "ERROR: Failed to calculate stack name"
            exit 1
          fi

          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "stack_name=$STACK_NAME" >> $GITHUB_OUTPUT
          echo "Branch name: $BRANCH_NAME"
          echo "Stack name: $STACK_NAME"

      # Step 12: Deploy shared stack + branch stack (dependency order is declared in app.py)
      - name: Deploy CDK stacks (shared + branch)
        id: deploy
        working-directory: aws_resources
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          BRANCH_NAME: ${{ steps.get-stack-name.outputs.branch_name }}
        run: |
          BRANCH_STACK="${{ steps.get-stack-name.outputs.stack_name }}"
          if cdk deploy StrideSharedStack "$BRANCH_STACK" --require-approval never --outputs-file cdk-outputs.json; then
            echo "✅ Deployment successful!"
            echo "Debug: cdk-outputs.json keys after deploy:"
            jq -r 'keys[]' cdk-outputs.json || echo "Debug: could not read keys from cdk-outputs.json"
            echo "deployment_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Deployment failed!"
            echo "deployment_status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      # Step 13: Get stack outputs and display in Actions UI
      - name: Get stack outputs
        id: stack-outputs
        working-directory: aws_resources
        run: |
          if [ ! -f "cdk-outputs.json" ]; then
            echo "Error: cdk-outputs.json not found"
            exit 1
          fi

          SHARED_STACK_KEY="StrideSharedStack"
          BRANCH_STACK_KEY="${{ steps.get-stack-name.outputs.stack_name }}"

          echo "Debug: expected branch stack key: $BRANCH_STACK_KEY"
          echo "Debug: expected shared stack key: $SHARED_STACK_KEY"
          echo "Debug: keys currently in cdk-outputs.json:"
          jq -r 'keys[]' cdk-outputs.json
          echo "Debug: full cdk-outputs.json contents:"
          jq '.' cdk-outputs.json

          if ! jq -e ".\"$BRANCH_STACK_KEY\"" cdk-outputs.json >/dev/null 2>&1; then
            echo "Error: Branch stack outputs missing for key \"$BRANCH_STACK_KEY\""
            echo "Keys in cdk-outputs.json:"
            jq -r 'keys[]' cdk-outputs.json
            exit 1
          fi

          if ! jq -e ".\"$SHARED_STACK_KEY\"" cdk-outputs.json >/dev/null 2>&1; then
            echo "Error: Shared stack outputs missing for key \"$SHARED_STACK_KEY\""
            echo "Debug: cdk-outputs.json keys:"
            jq -r 'keys[]' cdk-outputs.json
            echo "Debug: attempting CloudFormation lookup for shared stack outputs"
            if aws cloudformation describe-stacks --stack-name "$SHARED_STACK_KEY" --query 'Stacks[0].Outputs' --output json; then
              echo "Debug: CloudFormation lookup succeeded for $SHARED_STACK_KEY"
            else
              echo "Debug: CloudFormation lookup failed for $SHARED_STACK_KEY"
            fi
            exit 1
          fi

          # Branch stack: API, WebSocket, DynamoDB (per-environment)
          STACK_NAME=$(jq -r ".\"$BRANCH_STACK_KEY\".StackName // empty" cdk-outputs.json 2>/dev/null || echo "")
          if [ -z "$STACK_NAME" ] || [ "$STACK_NAME" == "null" ]; then
            echo "Error: Could not extract StackName from branch stack outputs ($BRANCH_STACK_KEY)"
            exit 1
          fi

          API_ENDPOINT=$(jq -r ".\"$BRANCH_STACK_KEY\".RestAPIEndpointURL // empty" cdk-outputs.json 2>/dev/null || echo "")
          if [ -z "$API_ENDPOINT" ] || [ "$API_ENDPOINT" == "null" ]; then
            echo "Warning: Could not extract RestAPIEndpointURL from branch stack outputs"
          fi

          WS_API_ENDPOINT=$(jq -r ".\"$BRANCH_STACK_KEY\".WebSocketURL // empty" cdk-outputs.json 2>/dev/null || echo "")
          if [ -z "$WS_API_ENDPOINT" ] || [ "$WS_API_ENDPOINT" == "null" ]; then
            echo "Warning: Could not extract WebSocketURL from branch stack outputs"
          fi

          COCO_CONFIG_TABLE=$(jq -r ".\"$BRANCH_STACK_KEY\".CocoConfigTableName // empty" cdk-outputs.json 2>/dev/null || echo "")
          if [ -z "$COCO_CONFIG_TABLE" ] || [ "$COCO_CONFIG_TABLE" == "null" ]; then
            echo "Warning: Could not extract CocoConfigTableName from branch stack outputs"
          fi

          # Shared RDS: single secret for schema + map seed (not emitted on branch stack)
          STRIDE_DB_ARN=$(jq -r ".\"$SHARED_STACK_KEY\".RdsSecretArn // empty" cdk-outputs.json 2>/dev/null || echo "")
          if [ -z "$STRIDE_DB_ARN" ] || [ "$STRIDE_DB_ARN" == "null" ]; then
            echo "Error: Could not extract RdsSecretArn from $SHARED_STACK_KEY outputs"
            exit 1
          fi

          echo "stack_name=$STACK_NAME" >> $GITHUB_OUTPUT
          echo "Deployed branch stack: $STACK_NAME (outputs key: $BRANCH_STACK_KEY)"
          echo "Shared stack outputs key: $SHARED_STACK_KEY"
          
          # Set outputs for use in subsequent steps or workflow outputs
          if [ -n "$API_ENDPOINT" ]; then
            echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT
            echo "✅ REST API Endpoint: $API_ENDPOINT"
          fi

          if [ -n "$WS_API_ENDPOINT" ]; then
            echo "ws_api_endpoint=$WS_API_ENDPOINT" >> $GITHUB_OUTPUT
            echo "✅ WebSocket API Endpoint: $WS_API_ENDPOINT"
          fi

          if [ -n "$COCO_CONFIG_TABLE" ]; then
            echo "coco_config_table=$COCO_CONFIG_TABLE" >> $GITHUB_OUTPUT
            echo "✅ COCO Config Table: $COCO_CONFIG_TABLE"
          fi

          echo "stride_db_secret_arn=$STRIDE_DB_ARN" >> $GITHUB_OUTPUT
          echo "✅ Shared RDS secret ARN (RdsSecretArn): $STRIDE_DB_ARN"
          
          # Create job summary with formatted markdown (shows up in Actions UI summary tab)
          DEPLOY_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          {
            echo "## 🚀 Deployment Successful"
            echo ""
            echo "### Stack Information"
            echo "- **Branch stack**: \`${STACK_NAME}\` (key: \`${BRANCH_STACK_KEY}\`)"
            echo "- **Shared stack**: \`StrideSharedStack\` (RDS + \`RdsSecretArn\`)"
            echo "- **Region**: \`us-east-1\`"
            echo "- **Deployed At**: \`${DEPLOY_TIME}\`"
            echo ""
            echo "### Stack Outputs"
            if [ -n "$API_ENDPOINT" ]; then
              echo ""
              echo "#### 🌐 API Gateway Endpoint"
              echo "- **URL**: [${API_ENDPOINT}](${API_ENDPOINT})"
              echo "- **Test**: \`curl ${API_ENDPOINT}/items\`"
            fi
            if [ -n "$WS_API_ENDPOINT" ]; then
              echo ""
              echo "#### 🌐 WebSocket Endpoint"
              echo "- **URL**: \`${WS_API_ENDPOINT}\`"
            fi
            echo ""
            echo "<details>"
            echo "<summary>📋 Branch stack outputs (\`${BRANCH_STACK_KEY}\`)</summary>"
            echo ""
            echo "\`\`\`json"
            jq ".\"$BRANCH_STACK_KEY\"" cdk-outputs.json
            echo "\`\`\`"
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary>📋 Shared stack outputs (\`${SHARED_STACK_KEY}\`)</summary>"
            echo ""
            echo "\`\`\`json"
            jq ".\"$SHARED_STACK_KEY\"" cdk-outputs.json
            echo "\`\`\`"
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY
          
          echo "📋 Branch stack outputs ($BRANCH_STACK_KEY):"
          jq ".\"$BRANCH_STACK_KEY\"" cdk-outputs.json
          echo "📋 Shared stack outputs ($SHARED_STACK_KEY):"
          jq ".\"$SHARED_STACK_KEY\"" cdk-outputs.json

      # Step 14: Populate COCO Config DynamoDB Table
      - name: Populate COCO Config DynamoDB Table
        if: steps.stack-outputs.outputs.coco_config_table != ''
        working-directory: aws_resources/schema_initializer
        env:
          TABLE_NAME: ${{ steps.stack-outputs.outputs.coco_config_table }}
          AWS_REGION: us-east-1
        run: |
          echo "Running schema population script..."
          python populate_obj_ddb.py

      # Step 15: Initialize shared RDS schema (idempotent)
      - name: Initialize RDS Database Schema
        working-directory: aws_resources/schema_initializer
        env:
          DB_SECRET_ARN: ${{ steps.stack-outputs.outputs.stride_db_secret_arn }}
          AWS_REGION: us-east-1
        run: |
          echo "Running RDS schema initialization script..."
          python populate_rds.py

      # Step 16: Populate shared RDS floor / map data (idempotent)
      - name: Populate shared RDS floor data
        working-directory: aws_resources/data_population
        env:
          DB_SECRET_ARN: ${{ steps.stack-outputs.outputs.stride_db_secret_arn }}
          AWS_REGION: us-east-1
          TRUE_NORTH_OFFSET_DEGREES: "51"
          BEARING_HORIZONTAL_FLIP: "true"
          BEARING_HORIZONTAL_MODE: "bands"
        run: |
          echo "Running floor / map population..."
          python run_population.py

  integration-tests:
    name: Run Integration Tests
    needs: deploy
    if: success() && needs.deploy.outputs.api_endpoint != ''
    uses: ./.github/workflows/integration-tests.yaml
    with:
      api_endpoint: ${{ needs.deploy.outputs.api_endpoint }}
      ws_api_endpoint: ${{ needs.deploy.outputs.ws_api_endpoint }}
    secrets: inherit
