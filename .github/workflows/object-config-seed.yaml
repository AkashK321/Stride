name: Object Config Seed

on:
  workflow_dispatch:
    inputs:
      table_name:
        description: "DynamoDB table name for COCO config"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  seed-coco-config:
    name: Seed COCO Config Table
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: aws_resources/object_config_seed/requirements.txt

      - name: Install Python dependencies
        working-directory: aws_resources
        run: |
          python -m pip install --upgrade pip
          pip install -r object_config_seed/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Populate COCO config table
        working-directory: aws_resources/object_config_seed
        env:
          TABLE_NAME: ${{ inputs.table_name }}
          AWS_REGION: us-east-1
        run: |
          python populate_obj_ddb.py

