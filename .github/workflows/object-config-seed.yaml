name: Object Config Seed

on:
  workflow_dispatch:
    inputs:
      table_name:
        description: "DynamoDB table name for COCO config (optional if stack_name is provided)"
        required: false
        type: string
      stack_name:
        description: "CloudFormation stack name to resolve CocoConfigTableName from outputs"
        required: false
        type: string
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"
        type: string
  workflow_call:
    inputs:
      table_name:
        description: "DynamoDB table name for COCO config (optional if stack_name is provided)"
        required: false
        type: string
      stack_name:
        description: "CloudFormation stack name to resolve CocoConfigTableName from outputs"
        required: false
        type: string
      aws_region:
        description: "AWS region"
        required: false
        default: "us-east-1"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  seed-coco-config:
    name: Seed COCO Config Table
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: aws_resources/object_config_seed/requirements.txt

      - name: Install Python dependencies
        working-directory: aws_resources
        run: |
          python -m pip install --upgrade pip
          pip install -r object_config_seed/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region || 'us-east-1' }}

      - name: Resolve COCO config table name
        id: resolve-table
        env:
          INPUT_TABLE_NAME: ${{ inputs.table_name }}
          INPUT_STACK_NAME: ${{ inputs.stack_name }}
          AWS_REGION: ${{ inputs.aws_region || 'us-east-1' }}
        run: |
          TABLE_NAME="$INPUT_TABLE_NAME"
          if [ -z "$TABLE_NAME" ]; then
            if [ -z "$INPUT_STACK_NAME" ]; then
              echo "❌ Either table_name or stack_name must be provided."
              exit 1
            fi

            TABLE_NAME=$(aws cloudformation describe-stacks \
              --stack-name "$INPUT_STACK_NAME" \
              --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='CocoConfigTableName'].OutputValue" \
              --output text)

            if [ -z "$TABLE_NAME" ] || [ "$TABLE_NAME" = "None" ]; then
              echo "❌ Could not resolve CocoConfigTableName from stack outputs: $INPUT_STACK_NAME"
              exit 1
            fi
          fi

          echo "Using COCO config table: $TABLE_NAME"
          echo "table_name=$TABLE_NAME" >> "$GITHUB_OUTPUT"

      - name: Populate COCO config table
        working-directory: aws_resources/object_config_seed
        env:
          TABLE_NAME: ${{ steps.resolve-table.outputs.table_name }}
          AWS_REGION: ${{ inputs.aws_region || 'us-east-1' }}
        run: |
          python populate_obj_ddb.py

